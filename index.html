<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> NIGHT OWL</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <nav>
            <div class="logo">NIGHT OWL<span>.</span></div>
            <ul class="nav-links">
                <li><a href="#">HOME</a></li>
                <li><a href="#">GALLERY</a></li>
                <li><a href="#">BLOG</a></li>
            </ul>
        </nav>

        <div class="content-wrapper">
            <div class="left-section">
                <h1>WELCOME BACK!</h1>
                <p class="subtitle">Don't have a account. <a href="#">Sign up</a></p>

                <form>
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="example@gmail.com">
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" value="12345678">
                            <i class="fa-regular fa-eye-slash toggle-password" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" checked>
                            <span class="custom-radio"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-password">Forget password?</a>
                    </div>

                    <button type="submit" class="sign-in-btn">Sign In</button>
                </form>
            </div>

            <div class="right-section">
                <div class="hero-image-container">
                   <img src="owl.png" class="owl-img"> 
                </div>

                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                    <a href="#"><i class="fa-solid fa-envelope"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
